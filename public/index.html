<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        <div id="status" class="status-box">Connecting...</div>
        <div id="game-info" class="game-info">
            <span id="player-role">You are: ...</span>
            <span id="current-turn">Turn: ...</span>
        </div>
        <div class="board" id="board">
            <!-- Cells will be generated by script.js -->
            <div id="strike-line" class="strike-line hidden"></div>
        </div>
        <div id="winner-banner" class="banner hidden">
            <h2 id="winner-text"></h2>
            <button id="reset-btn">Play Again</button>
        </div>
    </div>
    <!-- Load Socket.IO client library from root where the server is -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
